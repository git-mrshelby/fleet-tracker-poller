name: Fleet Tracker - Poll & Push

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes (GitHub minimum)
  workflow_dispatch:        # Manual trigger

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore auth secrets
        env:
          AUTH_SECRETS: ${{ secrets.AUTH_SECRETS }}
        run: |
          echo "$AUTH_SECRETS" | base64 -d > Auth/secrets.json
          python -c "import json; json.load(open('Auth/secrets.json')); print('Auth secrets OK')"

      - name: Poll & Push (every 60s for 280s)
        run: python fleet_supabase_pusher.py --loop 280 --interval 60
