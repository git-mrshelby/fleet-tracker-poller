name: Fleet Tracker - Poll & Push

on:
  schedule:
    - cron: '*/2 * * * *'  # Every 2 minutes
  workflow_dispatch:        # Manual trigger

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Poll & Push Location
        env:
          # Cached auth secrets (from first run)
          AUTH_SECRETS: ${{ secrets.AUTH_SECRETS }}
        run: |
          # Restore auth secrets if cached
          if [ -n "$AUTH_SECRETS" ]; then
            echo "$AUTH_SECRETS" > Auth/secrets.json
          fi
          
          # Run single poll
          python fleet_supabase_pusher.py --once
