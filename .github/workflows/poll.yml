name: Poll Tracker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore auth secrets
        env:
          AUTH_SECRETS: ${{ secrets.AUTH_SECRETS }}
        run: |
          echo "$AUTH_SECRETS" | base64 -d > Auth/secrets.json
          python -c "import json; json.load(open('Auth/secrets.json')); print('Auth secrets OK')"

      - name: Poll every 1s for 240s
        run: python fleet_supabase_pusher.py --loop 240 --interval 1

      - name: Self-trigger next run immediately
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run poll.yml --ref main
