name: Fleet Tracker - Poll & Push

on:
  schedule:
    - cron: '*/2 * * * *'  # Every 2 minutes
  workflow_dispatch:        # Manual trigger

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Restore auth secrets
        env:
          AUTH_SECRETS: ${{ secrets.AUTH_SECRETS }}
        run: |
          if [ -n "$AUTH_SECRETS" ]; then
            echo "$AUTH_SECRETS" | base64 -d > Auth/secrets.json
            echo "Auth secrets restored"
          else
            echo "ERROR: No AUTH_SECRETS secret found!"
            exit 1
          fi
      
      - name: Poll & Push Location
        run: python fleet_supabase_pusher.py --once
