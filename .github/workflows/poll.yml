name: Fleet Tracker - Poll & Push

on:
  schedule:
    - cron: '*/1 * * * *'  # Every minute (GitHub throttles to ~5min, script polls every 60s inside)
  workflow_dispatch:        # Manual trigger
  push:
    branches: [main]        # Re-register cron on push

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore auth secrets
        env:
          AUTH_SECRETS: ${{ secrets.AUTH_SECRETS }}
        run: |
          echo "$AUTH_SECRETS" | base64 -d > Auth/secrets.json
          python -c "import json; json.load(open('Auth/secrets.json')); print('Auth secrets OK')"

      - name: Poll every 60s for 300s
        run: python fleet_supabase_pusher.py --loop 300 --interval 60
